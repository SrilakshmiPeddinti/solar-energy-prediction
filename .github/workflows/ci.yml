name: CI - Continuous Integration Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-lint:
    name: Build & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black mypy

      - name: Code Formatting & Syntax Check
        run: |
          # Stop the build if there are Python syntax errors or undefined symbols
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Execute Integration Test Suite
        env:
          PYTHONPATH: .
        run: |
          pytest tests/test_50_features.py --doctest-modules --junitxml=junit/test-results-${{ matrix.python-version }}.xml --cov=src --cov-report=xml --cov-report=html

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results-python-${{ matrix.python-version }}
          path: junit/test-results-${{ matrix.python-version }}.xml
